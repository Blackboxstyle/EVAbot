<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EVAbot | 3ro B Electricidad</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="chat-container">
        <header class="chat-header">
            <h1>EVAbot</h1>
            <p>Asistente de 3ro B Electricidad</p>
            
            <a href="temas/temas.html" class="btn-temas">📁 TEMAS RECIENTES</a>
        </header>

        <main class="chat-messages" id="chat-messages">
            <div class="message bot">
                ¡Hola! Soy <strong>EVAbot</strong>. ¿Necesitas ayuda con algún concepto de electricidad o quieres ver los temas de clase?
            </div>
        </main>

        <form class="chat-input-area" id="chat-form">
            <input 
                type="text" 
                id="user-input" 
                placeholder="Escribe tu mensaje..." 
                autocomplete="off" 
                required 
            />
            <button type="submit" id="send-btn">Enviar</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
